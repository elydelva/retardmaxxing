pre-commit:
  parallel: true
  commands:
    biome:
      glob: "*.{ts,tsx,js,jsx,json,jsonc}"
      run: bunx biome check --write --unsafe --no-errors-on-unmatched {staged_files}
      stage_fixed: true

pre-push:
  commands:
    typecheck:
      run: bun run typecheck
      fail_text: "typecheck failed — fix before push"
