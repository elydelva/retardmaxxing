$schema: "https://moonrepo.dev/schemas/tasks.json"

fileGroups:
  sources:
    - "src/**/*"
    - "*.ts"
    - "*.tsx"
    - "*.js"

tasks:
  lint:
    command: "bunx biome check --unsafe ."
    inputs:
      - "@group(sources)"
      - "/biome.json"
      - "/.moon/tasks/typescript.yml"
    options:
      runInCI: true

  lint-fix:
    command: "bunx biome check --unsafe --write ."
    inputs:
      - "@group(sources)"
      - "/biome.json"
    options:
      runInCI: false
      cache: false

  typecheck:
    command: "bunx tsc --noEmit"
    inputs:
      - "@group(sources)"
      - "tsconfig.json"
    options:
      runInCI: true

  test:
    script: 'test -f vitest.config.ts && bunx vitest run || echo "no vitest.config.ts, skipping"'
    inputs:
      - "@group(sources)"
      - "vitest.config.ts"
    options:
      runInCI: true
      cache: true

  build:
    command: 'echo "no build configured"'
    options:
      runInCI: true
