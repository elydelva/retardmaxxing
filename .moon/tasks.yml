$schema: "https://moonrepo.dev/schemas/tasks.json"

fileGroups:
  sources:
    - "src/**/*"
    - "*.ts"
    - "*.tsx"
    - "*.js"

tasks:
  lint:
    command: "biome check --unsafe ."
    inputs:
      - "@group(sources)"
      - "/biome.json"
      - "/.moon/tasks.yml"
    options:
      runInCI: true

  lint-fix:
    command: "biome check --unsafe --write ."
    inputs:
      - "@group(sources)"
      - "/biome.json"
    options:
      runInCI: false
      cache: false

  typecheck:
    command: "tsc --noEmit"
    inputs:
      - "@group(sources)"
      - "tsconfig.json"
    deps:
      - "^:typecheck"
    options:
      runInCI: true

  test:
    command: "vitest run"
    inputs:
      - "@group(sources)"
      - "vitest.config.ts"
    options:
      runInCI: true
      cache: true

  build:
    command: 'echo "no build configured"'
    options:
      runInCI: true
