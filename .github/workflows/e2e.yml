name: E2E

on:
  pull_request:
    paths:
      - "apps/api/**"
      - "apps/app/**"
      - "apps/mobile/**"
      - "packages/**"
      - "bun.lock"
      - ".github/workflows/e2e.yml"
  workflow_dispatch:

concurrency:
  group: e2e-${{ github.ref }}
  cancel-in-progress: true

env:
  BUN_VERSION: 1.3.11

jobs:
  cypress:
    name: Cypress (web)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with: { bun-version: 1.3.11 }
      - uses: actions/cache@v4
        with:
          path: |
            node_modules
            apps/*/node_modules
            packages/*/node_modules
          key: modules-${{ runner.os }}-${{ env.BUN_VERSION }}-${{ hashFiles('bun.lock', 'bun.lockb', 'package.json') }}
      - run: bun install --frozen-lockfile
      - name: Apply local D1 migrations
        run: cd apps/api && bunx wrangler d1 migrations apply retardmaxxing-db --local || true
      - name: Start API
        run: |
          cd apps/api
          bunx wrangler dev --persist-to ../../.wrangler/state &
          bunx wait-on http://localhost:8787
      - name: Start app
        run: |
          cd apps/app
          bun dev &
          bunx wait-on http://localhost:3001
      - name: Cypress run
        run: bun run --cwd apps/app e2e

  maestro:
    name: Maestro (mobile)
    runs-on: macos-14
    timeout-minutes: 30
    if: false  # enable once you have a signed iOS build + simulator setup
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with: { bun-version: 1.3.11 }
      - uses: actions/cache@v4
        with:
          path: |
            node_modules
            apps/*/node_modules
            packages/*/node_modules
          key: modules-${{ runner.os }}-${{ env.BUN_VERSION }}-${{ hashFiles('bun.lock', 'bun.lockb', 'package.json') }}
      - run: bun install --frozen-lockfile
      - name: Install Maestro
        run: curl -Ls https://get.maestro.mobile.dev | bash
      - name: Build iOS dev client (local)
        run: cd apps/mobile && bunx eas build --profile development --platform ios --local --non-interactive
      - name: Run Maestro flows
        run: maestro test apps/mobile/.maestro/flows
